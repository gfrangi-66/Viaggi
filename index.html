<!DOCTYPE html>
<html lang="it">
<head>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0f0f14;color:#f0ede6;font-family:'DM Sans','Segoe UI',sans-serif;max-width:480px;margin:0 auto;}
input,select,button{font-family:inherit;}
select option{background:#17171f;}
.page{padding:16px 20px 100px;}
.hidden{display:none!important;}
.btn{background:linear-gradient(135deg,#d4a847,#e87b4b);border:none;border-radius:12px;padding:15px;color:#0f0f14;font-weight:700;font-size:16px;cursor:pointer;width:100%;margin-top:8px;display:block;}
.btn-sm{background:#d4a847;color:#0f0f14;border:none;border-radius:8px;padding:6px 14px;font-weight:700;font-size:13px;cursor:pointer;}
.btn-out{background:transparent;border:1px solid #2a2a38;border-radius:12px;padding:12px;color:#aaa;font-weight:600;font-size:14px;cursor:pointer;width:100%;margin-top:8px;}
.inp{background:#17171f;border:1px solid #2a2a38;border-radius:10px;padding:12px 14px;color:#f0ede6;font-size:15px;margin-bottom:18px;outline:none;width:100%;box-sizing:border-box;}
.lbl{font-size:12px;color:#888;letter-spacing:.4px;margin-bottom:6px;text-transform:uppercase;display:block;}
.card{background:#17171f;border:1px solid #1e1e28;border-radius:14px;padding:14px 16px;display:flex;align-items:center;gap:12px;margin-bottom:10px;}
.toolbar{display:flex;gap:10px;margin-bottom:10px;}
.filt{flex:1;background:#1a1a24;border:1px solid #2a2a38;color:#f0ede6;border-radius:10px;padding:8px 12px;font-size:12px;}
.filt2{flex:1;background:#1a1a24;border:1px solid #2a2a38;color:#f0ede6;border-radius:10px;padding:8px 12px;font-size:13px;}
header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;background:#0f0f14;border-bottom:1px solid #1e1e28;position:sticky;top:0;z-index:10;}
.logo{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#d4a847,#e87b4b);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;color:#0f0f14;}
.iBtn{background:#1a1a24;border:none;color:#f0ede6;width:34px;height:34px;border-radius:10px;font-size:16px;cursor:pointer;}
.fab{position:fixed;bottom:28px;right:max(20px,calc(50% - 240px + 20px));width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,#d4a847,#e87b4b);border:none;color:#0f0f14;font-size:28px;cursor:pointer;box-shadow:0 4px 20px rgba(212,168,71,.4);z-index:20;}
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);padding:14px 28px;border-radius:30px;font-size:15px;font-weight:700;color:#fff;z-index:200;box-shadow:0 4px 24px rgba(0,0,0,.6);white-space:nowrap;max-width:90vw;text-align:center;transition:opacity .3s;}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);display:none;align-items:center;justify-content:center;z-index:50;padding:0 24px;}
.overlay.show{display:flex;}
.modal{background:#17171f;border:1px solid #2a2a38;border-radius:16px;padding:24px;width:100%;max-width:380px;}
.cat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px;}
.cat-btn{background:#17171f;border:1px solid #2a2a38;border-radius:12px;padding:12px 8px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;color:#aaa;font-size:11px;font-weight:500;}
.summ{background:linear-gradient(135deg,#1c1a10,#1a1014);border:1px solid #2e2a1a;border-radius:16px;padding:16px 20px;display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;margin-top:6px;}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;}
.chip{display:flex;align-items:center;gap:6px;padding:4px 12px;border-radius:20px;border:1px solid;font-size:12px;font-weight:500;}
.fhdr{display:flex;align-items:center;gap:14px;margin-bottom:20px;}
.bBtn{background:none;border:none;color:#d4a847;font-size:14px;cursor:pointer;padding:0;}
.iaBtn{background:#d4a847;border:none;color:#0f0f14;width:36px;height:48px;border-radius:10px;font-size:20px;cursor:pointer;flex-shrink:0;}
.errBox{background:#2a1010;border:1px solid #c0392b;border-radius:10px;padding:12px 14px;margin-bottom:8px;font-size:14px;color:#e87b4b;font-weight:600;}
.infoBox{background:#1a1a24;border-radius:10px;padding:12px 14px;font-size:12px;color:#888;line-height:1.6;margin-bottom:18px;}
.row{display:flex;gap:8px;align-items:center;margin-bottom:18px;}
.fotoArea{background:#17171f;border:2px dashed #2a2a38;border-radius:12px;min-height:80px;display:flex;align-items:center;justify-content:center;cursor:pointer;margin-bottom:10px;overflow:hidden;}
.aiBanner{background:#1a1a2e;border:1px solid #4B8BE8;border-radius:10px;padding:10px 14px;font-size:13px;color:#4B8BE8;margin-bottom:10px;}
.aiBox{background:#0e1e14;border:1px solid #2a4a2e;border-radius:12px;padding:14px;margin-bottom:10px;}
.aiRow{display:flex;justify-content:space-between;margin-bottom:4px;font-size:13px;}
.clrRow{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:24px;}
.clrSw{width:32px;height:32px;border-radius:8px;cursor:pointer;}
.ppills{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px;}
.ppill{font-size:10px;font-weight:600;border:1px solid;border-radius:10px;padding:2px 8px;}
.tabs{display:flex;gap:4px;background:#0f0f14;border-radius:10px;padding:4px;margin-bottom:20px;}
.tab{flex:1;padding:8px;border:none;border-radius:8px;background:transparent;color:#666;font-size:14px;cursor:pointer;}
.tab.on{background:#1e1e2e;color:#f0ede6;font-weight:700;}
.mapsBtn{display:flex;align-items:center;justify-content:center;gap:8px;background:#1a3a5a;border:1px solid #4B8BE8;color:#4B8BE8;border-radius:10px;padding:10px;font-weight:700;font-size:13px;margin:12px 0;text-decoration:none;cursor:pointer;}
.connBar{background:#0e1620;border:1px solid #1e3050;border-radius:10px;padding:12px 14px;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center;}
.aBtn{background:transparent;border:none;color:#888;cursor:pointer;font-size:14px;padding:2px 6px;}
details summary{font-size:12px;color:#4B8BE8;cursor:pointer;margin-bottom:8px;padding:4px 0;}
pre{background:#0a0a10;border-radius:8px;padding:10px;font-size:10px;color:#4BE8C3;overflow:auto;line-height:1.5;white-space:pre-wrap;margin-bottom:16px;}
</style>
</head>
<body>
<div id="scr-load" style="min-height:100vh;display:flex;align-items:center;justify-content:center;color:#666;font-size:16px;">Caricamento…</div>
<div id="scr-setup" class="hidden"></div>
<div id="scr-login" class="hidden"></div>
<div id="scr-app" class="hidden">
  <header>
    <div style="display:flex;align-items:center;gap:12px;">
      <div class="logo">NS</div>
      <div><div style="font-weight:700;font-size:16px;">NotaSpese</div><div id="hdrSub" style="font-size:11px;color:#666;margin-top:1px;">locale</div></div>

    <div style="display:flex;gap:6px;">
      <button class="iBtn" onclick="openNuova()">＋</button>
      <button class="iBtn" onclick="goView('clienti')">👥</button>
      <button class="iBtn" onclick="goView('impostazioni')">⚙</button>
    </div>
  </header>
  <div id="vLista" class="page"></div>
  <div id="vNuova" class="page hidden"></div>
  <div id="vClienti" class="page hidden"></div>
  <div id="vEditC" class="page hidden"></div>
  <div id="vImpost" class="page hidden"></div>
  <button class="fab" id="fab" onclick="openNuova()">＋</button>
</div>
<div class="overlay" id="modCliente">
  <div class="modal">
    <div style="font-size:17px;font-weight:700;margin-bottom:16px;">Nuovo cliente</div>
    <input class="inp" id="ncNome" placeholder="Nome" onkeydown="if(event.key=='Enter')saveNC()"/>
    <div class="clrRow" id="ncColors"></div>
    <div style="display:flex;gap:10px;">
      <button class="btn" style="padding:12px;" onclick="saveNC()">✓ Crea</button>
      <button class="btn-out" style="margin:0;" onclick="closeModal('modCliente')">Annulla</button>
    </div>
  </div>
</div>
<div class="overlay" id="modProgetto">
  <div class="modal">
    <div style="font-size:17px;font-weight:700;margin-bottom:8px;">Nuovo progetto</div>
    <div style="font-size:12px;color:#888;margin-bottom:12px;">Cliente: <span id="npCl"></span></div>
    <input class="inp" id="npNome" placeholder="Nome progetto" onkeydown="if(event.key=='Enter')saveNP()"/>
    <div style="display:flex;gap:10px;">
      <button class="btn" style="padding:12px;" onclick="saveNP()">✓ Crea</button>
      <button class="btn-out" style="margin:0;" onclick="closeModal('modProgetto')">Annulla</button>
    </div>
  </div>
</div>
<div class="toast hidden" id="toast"></div>
<input type="file" id="fileFoto" accept="image/*" capture="environment" style="display:none;" onchange="onFoto(this)"/>
<script>

// ── CONFIG ────────────────────────────────────────────────────────────────────
const CAT=[
  {id:"km",       l:"Km / Auto",    e:"🚗", c:"#E8B84B"},
  {id:"pasto",    l:"Pasto",        e:"🍽️", c:"#E87B4B"},
  {id:"hotel",    l:"Hotel",        e:"🏨", c:"#4B8BE8"},
  {id:"treno",    l:"Treno / Volo", e:"✈️", c:"#4BE8C3"},
  {id:"taxi",     l:"Taxi / Uber",  e:"🚕", c:"#C34BE8"},
  {id:"pedaggi",  l:"Pedaggi",      e:"🛣️", c:"#E8D44B"},
  {id:"parcheggi",l:"Parcheggi",    e:"🅿️", c:"#4BD4E8"},
  {id:"altro",    l:"Altro",        e:"📎", c:"#8BE84B"},
];
const COLORS=["#4B8BE8","#E8B84B","#4BE8C3","#C34BE8","#E87B4B","#8BE84B","#E84B7B","#4BE870"];
const fmt=n=>Number(n||0).toLocaleString("it-IT",{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtD=s=>{if(!s)return"";const p=s.split("-");return p.length===3?p[2]+"/"+p[1]+"/"+p[0].slice(2):s;};

// ── STORAGE ───────────────────────────────────────────────────────────────────
const KD="ns_v7",KC="ns_cr_v4",KS="ns_ss_v4";
const lsG=k=>{try{return JSON.parse(localStorage.getItem(k));}catch{return null;}};
const lsS=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}};
const ckG=k=>{try{const m=document.cookie.match(new RegExp(k+"=([^;]+)"));return m?JSON.parse(decodeURIComponent(m[1])):null;}catch{return null;}};
const ckS=(k,v,d=365)=>{try{const e=new Date(Date.now()+d*864e5).toUTCString();document.cookie=k+"="+encodeURIComponent(JSON.stringify(v))+";expires="+e+";path=/;SameSite=Lax";}catch{}};
const ckD=k=>{document.cookie=k+"=;expires=Thu,01 Jan 1970 00:00:00 UTC;path=/;";};
const defP=()=>({nome:"",piva:"",tariffaKm:0.40,anthropicKey:"",aiProxyUrl:""});
const defDB=()=>({spese:[],clienti:[],profilo:defP()});
let DB=lsG(KD)||defDB();
if(!DB.profilo)DB.profilo=defP();
const save=()=>lsS(KD,DB);
const ldCr=()=>lsG(KC)||ckG(KC)||{url:"",anonKey:""};
const svCr=v=>{lsS(KC,v);ckS(KC,v);};
const ldSs=()=>lsG(KS)||ckG(KS);
const svSs=v=>{lsS(KS,v);ckS(KS,v,7);};
const clSs=()=>{try{localStorage.removeItem(KS);}catch{}ckD(KS);};

// ── SUPABASE ──────────────────────────────────────────────────────────────────
class SB{
  constructor(u,k){this.url=u.replace(/\/$/,"");this.key=k;this.tok=null;}
  h(x={}){return{"Content-Type":"application/json","apikey":this.key,"Authorization":"Bearer "+(this.tok||this.key),...x};}
  async signIn(e,p){const r=await fetch(this.url+"/auth/v1/token?grant_type=password",{method:"POST",headers:this.h(),body:JSON.stringify({email:e,password:p})});const d=await r.json();if(!r.ok)throw new Error(d.msg||d.message||"Credenziali non corrette");this.tok=d.access_token;return d;}
  async signUp(e,p){const r=await fetch(this.url+"/auth/v1/signup",{method:"POST",headers:this.h(),body:JSON.stringify({email:e,password:p})});const d=await r.json();if(!r.ok)throw new Error(d.msg||d.message||"Errore registrazione");if(!d.access_token)throw new Error("CONFIRM_EMAIL");this.tok=d.access_token;return d;}
  async sess(){const s=ldSs();if(!s)return null;try{if(s.expires_at&&Date.now()/1000>s.expires_at-60){const r=await fetch(this.url+"/auth/v1/token?grant_type=refresh_token",{method:"POST",headers:this.h(),body:JSON.stringify({refresh_token:s.refresh_token})});if(!r.ok){clSs();return null;}const d=await r.json();this.tok=d.access_token;const ns={...d,expires_at:Math.floor(Date.now()/1000)+(d.expires_in||3600)};svSs(ns);return ns;}this.tok=s.access_token;return s;}catch{return null;}}
  svSess(d){const s={...d,expires_at:Math.floor(Date.now()/1000)+(d.expires_in||3600)};svSs(s);this.tok=d.access_token;}
  logout(){clSs();this.tok=null;}
  async sel(t,q=""){const r=await fetch(this.url+"/rest/v1/"+t+"?"+q+"&order=created_at.desc",{headers:this.h({"Prefer":"return=representation"})});if(!r.ok)throw new Error("sel "+t+" "+r.status);return r.json();}
  async ups(t,row){const r=await fetch(this.url+"/rest/v1/"+t,{method:"POST",headers:this.h({"Prefer":"resolution=merge-duplicates,return=representation"}),body:JSON.stringify(row)});if(!r.ok){let e={};try{e=await r.json();}catch{}throw new Error(e.message||"ups "+r.status);}return r.json();}
  async del(t,id){const r=await fetch(this.url+"/rest/v1/"+t+"?id=eq."+id,{method:"DELETE",headers:this.h({"Prefer":"return=minimal"})});if(!r.ok)throw new Error("del "+r.status);}
}
let sb=null;

// ── AI ────────────────────────────────────────────────────────────────────────
async function aiScan(b64,mime,key,proxy){
  const url=proxy?proxy.replace(/\/$/,""):"https://api.anthropic.com/v1/messages";
  const r=await fetch(url,{method:"POST",headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:800,system:'Analizza scontrino. Rispondi SOLO con JSON: {"importo":numero_o_null,"descrizione":"stringa","categoria":"pasto|hotel|treno|taxi|pedaggi|parcheggi|altro","data":"YYYY-MM-DD_o_null","note":"esercente"}',messages:[{role:"user",content:[{type:"image",source:{type:"base64",media_type:mime,data:b64}},{type:"text",text:"Analizza."}]}]})});
  if(!r.ok){let e={};try{e=await r.json();}catch{}throw new Error(e.error?.message||"Errore AI "+r.status);}
  const d=await r.json();
  const t=(d.content||[]).find(b=>b.type==="text")?.text||"{}";
  try{const m=t.replace(/```json|```/g,"").trim().match(/\{[\s\S]*\}/);return m?JSON.parse(m[0]):{};}catch{return{};}
}

// ── PDF ───────────────────────────────────────────────────────────────────────
function ldPDF(cb){if(window.jspdf){cb();return;}const s=document.createElement("script");s.src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js";s.onload=cb;document.head.appendChild(s);}
function doPDF(){
  const tk=parseFloat(DB.profilo.tariffaKm)||0.40;
  const sp=getFiltered();
  const cNome=ST.fC!=="tutti"?nmC(ST.fC):"Tutti i clienti";
  const prog=ST.fP!=="tutti"?ST.fP:"";
  const multi=cNome==="Tutti i clienti";
  const cMap=Object.fromEntries(DB.clienti.map(c=>[c.id,c.nome]));
  ldPDF(()=>{
    const{jsPDF}=window.jspdf;
    const doc=new jsPDF({unit:"mm",format:"a4"});
    const W=210,M=14;
    doc.setFillColor(15,15,20);doc.rect(0,0,W,44,"F");
    doc.setTextColor(255,255,255);doc.setFontSize(18);doc.setFont("helvetica","bold");doc.text("NOTA SPESE",M,13);
    doc.setFontSize(9);doc.setFont("helvetica","normal");doc.setTextColor(200,200,200);
    doc.text(DB.profilo.nome||"—",M,21);doc.text("P.IVA: "+(DB.profilo.piva||"—"),M,27);
    if(!multi){doc.setTextColor(212,168,71);doc.setFont("helvetica","bold");doc.text("Cliente: "+cNome,M,35);}
    if(prog){doc.setTextColor(100,220,160);doc.setFont("helvetica","bold");doc.text("Progetto: "+prog,(multi?M:M+80),35);}
    doc.setTextColor(212,168,71);doc.setFont("helvetica","bold");doc.setFontSize(9);doc.text("Periodo: "+ST.periodo,W-M,21,{align:"right"});
    doc.setTextColor(130,130,130);doc.setFont("helvetica","normal");doc.setFontSize(8);doc.text("Generata il "+new Date().toLocaleDateString("it-IT"),W-M,28,{align:"right"});
    doc.text(sp.length+" spese",W-M,34,{align:"right"});
    let y=54;
    const cols=multi?[14,26,52,86,120,153,178]:[14,26,60,104,138,162,185];
    const hdrs=multi?["Data","Cat.","Cliente","Progetto","Descrizione","Km","Importo"]:["Data","Cat.","Progetto","Descrizione","Note/Percorso","Km","Importo"];
    doc.setFillColor(235,233,225);doc.rect(M-2,y-5,W-2*M+4,8,"F");
    doc.setTextColor(30,30,30);doc.setFontSize(7.5);doc.setFont("helvetica","bold");
    hdrs.forEach((h,i)=>doc.text(h,cols[i],y));
    doc.setFont("helvetica","normal");let tot=0;
    sp.forEach((s,idx)=>{
      y+=8;if(y>268){doc.addPage();y=16;}
      if(idx%2===0){doc.setFillColor(250,249,246);doc.rect(M-2,y-5,W-2*M+4,8,"F");}
      const cat=CAT.find(c=>c.id===s.categoria);
      const imp=s.categoria==="km"?(parseFloat(s.km)||0)*tk:parseFloat(s.importo||0);
      tot+=imp;
      const dp=(s.data||"").split("-");
      const df=dp.length===3?dp[2]+"/"+dp[1]+"/"+dp[0].slice(2):s.data||"";
      doc.setTextColor(70,70,70);doc.setFontSize(7.5);
      doc.text(df,cols[0],y);
      doc.text(cat?cat.l.substring(0,8):s.categoria,cols[1],y);
      if(multi){doc.text(((cMap[s.clienteId])||"").substring(0,16),cols[2],y);doc.text((s.progetto||"").substring(0,16),cols[3],y);doc.text(doc.splitTextToSize(s.descrizione||"",32)[0]||"",cols[4],y);}
      else{doc.text((s.progetto||"").substring(0,18),cols[2],y);doc.text(doc.splitTextToSize(s.descrizione||"",36)[0]||"",cols[3],y);const ex=s.categoria==="km"&&s.partenza?(s.partenza.split(",")[0]+"→"+(s.arrivo||"").split(",")[0]):(s.note||"").substring(0,22);doc.text(ex.substring(0,24),cols[4],y);}
      doc.setTextColor(40,40,40);doc.setFont("helvetica","bold");
      if(s.categoria==="km")doc.text(String(s.km||0)+" km",cols[5],y);
      doc.text("€ "+fmt(imp),cols[6]+14,y,{align:"right"});
      doc.setFont("helvetica","normal");
    });
    y+=12;doc.setFillColor(15,15,20);doc.rect(M-2,y-6,W-2*M+4,11,"F");
    doc.setTextColor(220,180,80);doc.setFont("helvetica","bold");doc.setFontSize(10);
    doc.text("TOTALE RIMBORSO RICHIESTO",M,y);doc.text("€ "+fmt(tot),W-M,y,{align:"right"});

    // ── Pagine allegati foto ──
    const spConFoto=sp.filter(s=>s.foto);
    if(spConFoto.length>0){
      doc.addPage();
      doc.setFillColor(15,15,20);doc.rect(0,0,W,20,"F");
      doc.setTextColor(255,255,255);doc.setFontSize(12);doc.setFont("helvetica","bold");
      doc.text("ALLEGATI SCONTRINI",M,13);
      let ay=30;
      spConFoto.forEach((s,idx)=>{
        const cat=CAT.find(c=>c.id===s.categoria);
        const imp=s.categoria==="km"?(parseFloat(s.km)||0)*tk:parseFloat(s.importo||0);
        const dp=(s.data||"").split("-");
        const df=dp.length===3?dp[2]+"/"+dp[1]+"/"+dp[0].slice(2):s.data||"";
        // Label spesa
        doc.setFillColor(30,30,40);doc.rect(M-2,ay-4,W-2*M+4,10,"F");
        doc.setTextColor(212,168,71);doc.setFontSize(8);doc.setFont("helvetica","bold");
        doc.text((idx+1)+". "+df+" — "+(cat?cat.l:s.categoria)+" — "+esc2(s.descrizione||"")+" — € "+fmt(imp),M,ay+2);
        if(s.clienteId){const cn=(cMap[s.clienteId])||"";if(cn){doc.setTextColor(180,180,180);doc.text("Cliente: "+cn+(s.progetto?" · "+s.progetto:""),W-M,ay+2,{align:"right"});}}
        ay+=14;
        // Foto
        try{
          const imgH=80,imgW=W-2*M+4;
          if(ay+imgH>280){doc.addPage();ay=16;}
          doc.addImage(s.foto,"JPEG",M-2,ay,imgW,imgH,"","MEDIUM");
          ay+=imgH+10;
        }catch(e){
          doc.setTextColor(150,100,100);doc.setFontSize(8);doc.setFont("helvetica","normal");
          doc.text("[Immagine non incorporabile]",M,ay);
          ay+=10;
        }
        if(ay>260&&idx<spConFoto.length-1){doc.addPage();ay=16;}
      });
    }

    doc.save("nota-spese-"+[cNome,prog,ST.periodo].filter(Boolean).join("-").replace(/\s+/g,"-")+".pdf");
  });
}

// ── FOTO/AI ───────────────────────────────────────────────────────────────────
function onFoto(inp){
  const file=inp.files[0];inp.value="";if(!file)return;
  const mime=file.type||"image/jpeg";
  const reader=new FileReader();
  reader.onload=function(ev){
    const url=ev.target.result;if(!url)return;
    const b64=url.split(",")[1];if(!b64)return;
    ST.foto=url;ST.fotoMime=mime;ST.form.foto=url;
    renderNuova();
    const key=DB.profilo.anthropicKey||"",proxy=DB.profilo.aiProxyUrl||"";
    if(!key||!proxy){toast("Foto salvata. Configura AI nelle Impostazioni.");return;}
    const ld=document.getElementById("aiLoad");if(ld)ld.classList.remove("hidden");
    aiScan(b64,mime,key,proxy).then(r=>{
      if(ld)ld.classList.add("hidden");
      if(!r||!Object.keys(r).length){toast("AI: nessun dato estratto",true);return;}
      ST.aiSug=r;
      const bx=document.getElementById("aiBox"),rw=document.getElementById("aiRows");
      if(bx&&rw){
        let rh="";
        if(r.importo!=null)rh+=`<div class="aiRow"><span style="font-size:11px;color:#666;text-transform:uppercase;">Importo</span><span style="font-weight:600;color:#c8f0d0;">€ ${fmt(r.importo)}</span></div>`;
        if(r.descrizione)rh+=`<div class="aiRow"><span style="font-size:11px;color:#666;text-transform:uppercase;">Descrizione</span><span style="font-weight:600;color:#c8f0d0;">${r.descrizione}</span></div>`;
        if(r.categoria)rh+=`<div class="aiRow"><span style="font-size:11px;color:#666;text-transform:uppercase;">Categoria</span><span style="font-weight:600;color:#c8f0d0;">${(CAT.find(c=>c.id===r.categoria)||{}).e||""} ${r.categoria}</span></div>`;
        if(r.data)rh+=`<div class="aiRow"><span style="font-size:11px;color:#666;text-transform:uppercase;">Data</span><span style="font-weight:600;color:#c8f0d0;">${r.data}</span></div>`;
        if(r.note)rh+=`<div class="aiRow"><span style="font-size:11px;color:#666;text-transform:uppercase;">Note</span><span style="font-weight:600;color:#c8f0d0;">${r.note}</span></div>`;
        rw.innerHTML=rh;bx.classList.remove("hidden");
      }
    }).catch(e=>{if(ld)ld.classList.add("hidden");toast("AI: "+e.message,true);});
  };
  reader.onerror=()=>toast("Errore lettura foto",true);
  reader.readAsDataURL(file);
}

// ── CLIENTI ───────────────────────────────────────────────────────────────────
function renderClienti(){
  const t=tk();
  let h=`<div class="fhdr"><button class="bBtn" onclick="showOnly('lista');renderLista();">← Indietro</button><h2 style="font-size:18px;font-weight:700;margin:0;">Clienti</h2><button class="btn-sm" style="margin-left:auto;" onclick="openEC()">+ Nuovo</button></div>`;
  if(!DB.clienti.length)h+=`<div style="text-align:center;padding-top:60px;"><div style="font-size:48px;margin-bottom:12px;">👥</div><div style="color:#666;font-size:15px;margin-bottom:20px;">Nessun cliente</div><button class="btn" style="max-width:220px;margin:0 auto;" onclick="openEC()">+ Aggiungi</button></div>`;
  else DB.clienti.forEach(c=>{const ns=DB.spese.filter(s=>s.clienteId===c.id).length,totC=DB.spese.filter(s=>s.clienteId===c.id).reduce((a,s)=>a+(s.categoria==="km"?(parseFloat(s.km)||0)*t:parseFloat(s.importo||0)),0),pj=prjC(c.id);h+=`<div class="card" style="align-items:flex-start;"><div style="width:40px;height:40px;border-radius:12px;background:${c.colore};display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#0f0f14;flex-shrink:0;">${(c.nome[0]||"?").toUpperCase()}</div><div style="flex:1;min-width:0;"><div style="font-weight:600;font-size:14px;margin-bottom:3px;">${c.nome}</div>${c.piva?`<div style="font-size:11px;color:#777;margin-bottom:2px;">P.IVA: ${c.piva}</div>`:""} ${c.email?`<div style="font-size:11px;color:#777;margin-bottom:2px;">${c.email}</div>`:""}<div style="font-size:11px;color:#777;">${ns} spese · € ${fmt(totC)}</div>${pj.length?`<div class="ppills">${pj.map(p=>`<span class="ppill" style="border-color:${c.colore};color:${c.colore};">${p}</span>`).join("")}</div>`:""}</div><div style="display:flex;gap:4px;"><button class="aBtn" onclick="openEC('${c.id}')">✏</button><button class="aBtn" style="color:#c0392b;" onclick="delCl('${c.id}')">✕</button></div></div>`;});
  const el=document.getElementById("vClienti");if(el)el.innerHTML=h;
}
function openEC(id){
  ST.editCId=id||null;const c=id?DB.clienti.find(x=>x.id===id):null;
  ST.ecColor=c?c.colore:COLORS[DB.clienti.length%COLORS.length];
  let h=`<div class="fhdr"><button class="bBtn" onclick="showOnly('clienti');renderClienti();">← Indietro</button><h2 style="font-size:18px;font-weight:700;margin:0;">${c?"Modifica":"Nuovo cliente"}</h2></div>
  <label class="lbl">Nome *</label><input class="inp" id="ecN" type="text" placeholder="Acme S.r.l." value="${esc(c?c.nome:"")}">
  <label class="lbl">P.IVA</label><input class="inp" id="ecP" type="text" placeholder="IT00000000000" value="${esc(c&&c.piva?c.piva:"")}">
  <label class="lbl">Email</label><input class="inp" id="ecE" type="email" placeholder="amm@cliente.it" value="${esc(c&&c.email?c.email:"")}">
  <label class="lbl">Colore</label><div class="clrRow" id="ecClr"></div>
  <button class="btn" onclick="saveCl()"> ${c?"💾 Aggiorna":"✓ Salva"}</button>`;
  const el=document.getElementById("vEditC");if(el)el.innerHTML=h;
  const cr=document.getElementById("ecClr");if(cr)cr.innerHTML=COLORS.map(col=>`<div class="clrSw" style="background:${col};${col===ST.ecColor?"outline:3px solid #fff;outline-offset:2px;":""}" onclick="selEC('${col}')"></div>`).join("");
  showOnly("editCliente");
}
function selEC(col){ST.ecColor=col;const cr=document.getElementById("ecClr");if(cr)cr.innerHTML=COLORS.map(c=>`<div class="clrSw" style="background:${c};${c===col?"outline:3px solid #fff;outline-offset:2px;":""}" onclick="selEC('${c}')"></div>`).join("");}
function saveCl(){const n=(document.getElementById("ecN")||{}).value||"";if(!n.trim()){toast("Inserisci il nome",true);return;}const c={id:ST.editCId||String(Date.now()),nome:n.trim(),piva:(document.getElementById("ecP")||{}).value||"",email:(document.getElementById("ecE")||{}).value||"",colore:ST.ecColor};if(ST.editCId)DB.clienti=DB.clienti.map(x=>x.id===c.id?c:x);else DB.clienti.push(c);save();toast(ST.editCId?"Aggiornato ✓":"Aggiunto ✓");renderClienti();showOnly("clienti");syncCl(c);}
function delCl(id){if(!confirm("Eliminare?"))return;DB.clienti=DB.clienti.filter(c=>c.id!==id);save();renderClienti();toast("Eliminato");syncDCl(id);}

// ── MODAL INLINE ──────────────────────────────────────────────────────────────
function openMC(){ST.ncColor=COLORS[DB.clienti.length%COLORS.length];const cr=document.getElementById("ncColors");if(cr)cr.innerHTML=COLORS.map(c=>`<div class="clrSw" style="background:${c};${c===ST.ncColor?"outline:3px solid #fff;outline-offset:2px;":""}" onclick="selNC('${c}')"></div>`).join("");const i=document.getElementById("ncNome");if(i){i.value="";setTimeout(()=>i.focus(),100);}document.getElementById("modCliente").classList.add("show");}
function selNC(c){ST.ncColor=c;const cr=document.getElementById("ncColors");if(cr)cr.innerHTML=COLORS.map(x=>`<div class="clrSw" style="background:${x};${x===c?"outline:3px solid #fff;outline-offset:2px;":""}" onclick="selNC('${x}')"></div>`).join("");}
function saveNC(){const n=(document.getElementById("ncNome")||{}).value||"";if(!n.trim()){toast("Inserisci il nome",true);return;}const c={id:String(Date.now()),nome:n.trim(),piva:"",email:"",colore:ST.ncColor};DB.clienti.push(c);save();ST.form.clienteId=c.id;ST.form.progetto="";closeModal("modCliente");toast("Cliente creato ✓");renderNuova();syncCl(c);}
function openMP(){const el=document.getElementById("npCl");if(el){el.textContent=nmC(ST.form.clienteId);el.style.color=clC(ST.form.clienteId);}const i=document.getElementById("npNome");if(i){i.value="";setTimeout(()=>i.focus(),100);}document.getElementById("modProgetto").classList.add("show");}
function saveNP(){const n=(document.getElementById("npNome")||{}).value||"";if(!n.trim()){toast("Inserisci il nome",true);return;}ST.form.progetto=n.trim();closeModal("modProgetto");toast("Progetto impostato ✓");renderNuova();}

// ── IMPOSTAZIONI ──────────────────────────────────────────────────────────────
function renderImpost(){
  const p=DB.profilo,u=ST.utente;
  let h=`<div class="fhdr"><button class="bBtn" onclick="showOnly('lista');renderLista();">← Indietro</button><h2 style="font-size:18px;font-weight:700;margin:0;">Profilo & Dati</h2></div>`;
  if(u)h+=`<div class="connBar"><div><div style="color:#4BE84B;font-weight:600;font-size:13px;">☁ Connesso</div><div style="font-size:12px;color:#888;margin-top:2px;">${u.email||""}</div></div><button style="background:transparent;border:1px solid #555;color:#888;border-radius:8px;padding:6px 12px;font-size:12px;cursor:pointer;" onclick="doLogout()">Esci</button></div>`;
  h+=`<label class="lbl">Nome / Ragione sociale</label><input class="inp" id="pN" type="text" placeholder="Mario Rossi" value="${esc(p.nome||"")}">
  <label class="lbl">P.IVA</label><input class="inp" id="pPiva" type="text" placeholder="IT00000000000" value="${esc(p.piva||"")}">
  <label class="lbl">Tariffa rimborso km</label>
  <div style="position:relative;margin-bottom:4px;"><input class="inp" id="pTk" type="number" min="0" step="0.01" placeholder="0.40" value="${p.tariffaKm||0.40}" style="margin-bottom:0;padding-right:44px;"><div style="position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:12px;color:#888;pointer-events:none;">€/km</div></div>
  <div style="font-size:11px;color:#555;margin-bottom:18px;">ACI 2024: 0,40 €/km</div>
  <label class="lbl">Chiave API Anthropic (AI scontrini)</label><input class="inp" id="pAK" type="password" placeholder="sk-ant-..." value="${esc(p.anthropicKey||"")}">
  <label class="lbl">URL Proxy Cloudflare</label><input class="inp" id="pPx" type="text" placeholder="https://anthropic-proxy.tuonome.workers.dev" value="${esc(p.aiProxyUrl||"")}">
  <div style="font-size:11px;color:#555;margin-bottom:18px;">Necessario per AI. Vedi cloudflare-worker.js.</div>
  <button class="btn" onclick="saveProf()">💾 Salva profilo</button>
  <div class="infoBox" style="margin-top:20px;"><strong style="color:#d4a847;">⚠ Backup</strong><br>I dati sono anche nel browser. Esporta regolarmente.</div>
  <button class="btn" style="background:#1a2a1a;color:#4BE84B;border:1px solid #4BE84B;" onclick="expJSON()">⬇ Esporta backup JSON</button>
  <label class="btn" style="background:#1a1a2a;color:#4B8BE8;border:1px solid #4B8BE8;text-align:center;cursor:pointer;margin-top:8px;">⬆ Importa da JSON<input type="file" accept=".json" style="display:none;" onchange="impJSON(this)"></label>
  <button class="btn-out" style="margin-top:8px;" onclick="reconfigSB()">🔧 Riconfigura Supabase</button>
  <button class="btn" style="background:transparent;border:1px solid #c0392b;color:#c0392b;margin-top:8px;" onclick="clearLocal()">🗑 Cancella dati locali</button>`;
  const el=document.getElementById("vImpost");if(el)el.innerHTML=h;
}
function saveProf(){DB.profilo={nome:(document.getElementById("pN")||{}).value||"",piva:(document.getElementById("pPiva")||{}).value||"",tariffaKm:parseFloat((document.getElementById("pTk")||{}).value)||0.40,anthropicKey:(document.getElementById("pAK")||{}).value||"",aiProxyUrl:(document.getElementById("pPx")||{}).value||""};save();toast("Profilo salvato ✓");syncProf(DB.profilo);}
function expJSON(){const b=new Blob([JSON.stringify(DB,null,2)],{type:"application/json"});const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download="notaspese-"+new Date().toISOString().slice(0,10)+".json";a.click();}
function impJSON(inp){const f=inp.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{DB=JSON.parse(ev.target.result);save();toast("Importato ✓");renderLista();}catch{toast("File non valido",true);}};r.readAsText(f);}
function reconfigSB(){svCr({url:"",anonKey:""});renderSetup();}
function clearLocal(){if(confirm("Eliminare tutti i dati locali?")){DB=defDB();save();toast("Eliminati");renderLista();}}
function doLogout(){if(sb)sb.logout();ST.utente=null;renderLogin();}

// ── SETUP ─────────────────────────────────────────────────────────────────────
function renderSetup(){
  ["scr-app","scr-login","scr-load"].forEach(id=>{const e=document.getElementById(id);if(e)e.classList.add("hidden");});
  const saved=ldCr(),el=document.getElementById("scr-setup");
  if(!el)return;el.classList.remove("hidden");
  el.innerHTML=`<div style="min-height:100vh;background:#0f0f14;display:flex;align-items:center;justify-content:center;padding:20px;"><div style="background:#17171f;border:1px solid #2a2a38;border-radius:20px;padding:32px 28px;width:100%;max-width:440px;">
  <div style="width:48px;height:48px;border-radius:14px;background:linear-gradient(135deg,#d4a847,#e87b4b);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:18px;color:#0f0f14;margin:0 auto 16px;">NS</div>
  <div style="font-size:22px;font-weight:800;text-align:center;margin-bottom:4px;">Collega Supabase</div>
  <div style="font-size:13px;color:#666;text-align:center;margin-bottom:20px;">Sincronizzazione cloud gratuita</div>
  <div style="background:#0e1620;border:1px solid #1e3050;border-radius:10px;padding:14px;margin-bottom:16px;font-size:12px;color:#888;line-height:1.7;"><strong style="color:#4B8BE8;">3 passi su supabase.com:</strong><br>1. Crea account → nuovo progetto<br>2. Settings → API → copia URL e "anon public key"<br>3. SQL Editor → esegui lo script (vedi sotto)</div>
  <details style="margin-bottom:16px;"><summary>📋 Script SQL da eseguire</summary>
  <pre>create table if not exists spese (
  id text primary key, user_id uuid references auth.users,
  data text, categoria text, importo float, km float,
  partenza text, arrivo text, descrizione text, note text,
  foto text, foto_media_type text, cliente_id text, progetto text,
  created_at timestamptz default now());
create table if not exists clienti (
  id text primary key, user_id uuid references auth.users,
  nome text, piva text, email text, colore text,
  created_at timestamptz default now());
create table if not exists profilo (
  id text primary key, user_id uuid references auth.users unique,
  nome text, piva text, tariffa_km float default 0.40,
  created_at timestamptz default now());
alter table spese enable row level security;
alter table clienti enable row level security;
alter table profilo enable row level security;
create policy "own" on spese using (auth.uid()=user_id) with check (auth.uid()=user_id);
create policy "own" on clienti using (auth.uid()=user_id) with check (auth.uid()=user_id);
create policy "own" on profilo using (auth.uid()=user_id) with check (auth.uid()=user_id);</pre></details>
  <label class="lbl">Project URL</label><input class="inp" id="sUrl" type="text" placeholder="https://xxxx.supabase.co" value="${esc(saved.url||"")}">
  <label class="lbl">Anon public key</label><input class="inp" id="sKey" type="text" placeholder="eyJhbGciOiJIUzI1NiIs..." value="${esc(saved.anonKey||"")}">
  <div id="sErr" class="errBox hidden"></div>
  <button class="btn" id="sBt" onclick="doSetup()">🔗 Collega Supabase</button>
  <button class="btn-out" onclick="skipSetup()">Usa solo in locale</button>
  </div></div>`;
}
async function doSetup(){
  const url=(document.getElementById("sUrl")||{}).value||"",key=(document.getElementById("sKey")||{}).value||"";
  const err=document.getElementById("sErr"),btn=document.getElementById("sBt");
  if(!url||!key){if(err){err.textContent="Inserisci entrambi i campi";err.classList.remove("hidden");}return;}
  if(btn)btn.textContent="Connessione…";
  try{sb=new SB(url.trim(),key.trim());try{await sb.sel("spese","limit=1");}catch(e){if(e.message.includes("401")||e.message.includes("403")){if(err){err.textContent="Credenziali non valide";err.classList.remove("hidden");}if(btn)btn.textContent="🔗 Collega Supabase";return;}}svCr({url:url.trim(),anonKey:key.trim()});renderLogin();}catch{svCr({url:url.trim(),anonKey:key.trim()});renderLogin();}
}
function skipSetup(){renderApp();}

// ── LOGIN ─────────────────────────────────────────────────────────────────────
function renderLogin(){
  ["scr-app","scr-setup","scr-load"].forEach(id=>{const e=document.getElementById(id);if(e)e.classList.add("hidden");});
  const el=document.getElementById("scr-login");if(!el)return;
  el.classList.remove("hidden");
  el.innerHTML=`<div style="min-height:100vh;background:#0f0f14;display:flex;align-items:center;justify-content:center;padding:20px;"><div style="background:#17171f;border:1px solid #2a2a38;border-radius:20px;padding:32px 28px;width:100%;max-width:380px;">
  <div style="width:48px;height:48px;border-radius:14px;background:linear-gradient(135deg,#d4a847,#e87b4b);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:18px;color:#0f0f14;margin:0 auto 16px;">NS</div>
  <div style="font-size:22px;font-weight:800;text-align:center;margin-bottom:4px;">NotaSpese</div>
  <div style="font-size:13px;color:#666;text-align:center;margin-bottom:20px;">Accedi al tuo account</div>
  <div class="tabs"><button class="tab on" id="tA" onclick="swTab('accedi')">Accedi</button><button class="tab" id="tR" onclick="swTab('registrati')">Registrati</button></div>
  <div id="lInfo" class="hidden" style="font-size:13px;color:#4BE84B;margin-bottom:12px;padding:10px;background:#0e200e;border-radius:8px;border:1px solid #2a4a2a;"></div>
  <label class="lbl">Email</label><input class="inp" id="lEm" type="email" placeholder="gianni@esempio.it" onkeydown="if(event.key=='Enter')doLogin()">
  <label class="lbl">Password</label><input class="inp" id="lPw" type="password" placeholder="La tua password" onkeydown="if(event.key=='Enter')doLogin()">
  <div id="lErr" class="errBox hidden"></div>
  <button class="btn" id="lBt" onclick="doLogin()">→ Accedi</button>
  </div></div>`;
}
let loginTab="accedi";
function swTab(t){loginTab=t;["accedi","registrati"].forEach(n=>{const e=document.getElementById(n==="accedi"?"tA":"tR");if(e)e.classList.toggle("on",n===t);});const b=document.getElementById("lBt");if(b)b.textContent=t==="accedi"?"→ Accedi":"✓ Crea account";const p=document.getElementById("lPw");if(p)p.placeholder=t==="registrati"?"Minimo 6 caratteri":"La tua password";const err=document.getElementById("lErr");if(err)err.classList.add("hidden");}
async function doLogin(){
  const em=(document.getElementById("lEm")||{}).value||"",pw=(document.getElementById("lPw")||{}).value||"";
  const err=document.getElementById("lErr"),info=document.getElementById("lInfo"),btn=document.getElementById("lBt");
  if(!em||!pw){if(err){err.textContent="Inserisci email e password";err.classList.remove("hidden");}return;}
  if(loginTab==="registrati"&&pw.length<6){if(err){err.textContent="Password minimo 6 caratteri";err.classList.remove("hidden");}return;}
  if(btn)btn.textContent="…";if(err)err.classList.add("hidden");
  try{
    const d=loginTab==="accedi"?await sb.signIn(em.trim(),pw.trim()):await sb.signUp(em.trim(),pw.trim());
    sb.svSess(d);ST.utente=d.user||{email:em.trim()};
    renderApp();ldCloud();
  }catch(e){
    if(e.message==="CONFIRM_EMAIL"){if(info){info.textContent="Controlla la tua email per confermare, poi accedi.";info.classList.remove("hidden");}swTab("accedi");}
    else{if(err){err.textContent=e.message;err.classList.remove("hidden");}}
    if(btn)btn.textContent=loginTab==="accedi"?"→ Accedi":"✓ Crea account";
  }
}

// ── APP INIT ──────────────────────────────────────────────────────────────────
function renderApp(){
  ["scr-load","scr-setup","scr-login"].forEach(id=>{const e=document.getElementById(id);if(e)e.classList.add("hidden");});
  document.getElementById("scr-app").classList.remove("hidden");
  setSyncUI("idle");renderLista();showOnly("lista");
}
(async function init(){
  const cr=ldCr();
  if(!cr.url||!cr.anonKey){renderSetup();return;}
  sb=new SB(cr.url,cr.anonKey);
  const s=await sb.sess().catch(()=>null);
  if(s){ST.utente=s.user||{email:"utente"};renderApp();ldCloud();}
  else renderLogin();
})();

</script>
</body>
